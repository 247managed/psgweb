<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4effc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8f6f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d5f5e3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)" rx="12"/>
  <!-- Stylized office/building -->
  <g transform="translate(300,160)" opacity="0.25">
    <rect x="-60" y="-60" width="120" height="120" rx="8" fill="#1a5276" stroke="#2980b9" stroke-width="2"/>
    <rect x="-45" y="-45" width="30" height="30" rx="3" fill="#5dade2"/>
    <rect x="15" y="-45" width="30" height="30" rx="3" fill="#5dade2"/>
    <rect x="-45" y="0" width="30" height="30" rx="3" fill="#5dade2"/>
    <rect x="15" y="0" width="30" height="30" rx="3" fill="#5dade2"/>
    <rect x="-15" y="30" width="30" height="30" rx="2" fill="#27ae60"/>
  </g>
  <text x="300" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a5276" opacity="0.5">Our Office</text>
  <text x="300" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5d6d7e" opacity="0.4">A welcoming, comfortable environment</text>
</svg>
