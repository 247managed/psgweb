<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGrad)" />
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Stylized leaf/growth symbol -->
  <g transform="translate(100,100)" fill="white">
    <!-- Central stem -->
    <path d="M0,35 Q0,0 0,-35" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M-2,10 Q-25,-5 -18,-30 Q-5,-20 -2,-5" fill="rgba(255,255,255,0.9)"/>
    <!-- Right leaf -->
    <path d="M2,5 Q25,-10 20,-32 Q5,-22 2,-8" fill="rgba(255,255,255,0.9)"/>
    <!-- Small leaf bud -->
    <path d="M-1,-30 Q-8,-42 0,-48 Q8,-42 1,-30" fill="rgba(255,255,255,0.9)"/>
    <!-- Ground/roots -->
    <path d="M-15,35 Q-8,30 0,35 Q8,30 15,35" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Initials -->
  <text x="100" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="rgba(255,255,255,0.9)">PSG</text>
</svg>
